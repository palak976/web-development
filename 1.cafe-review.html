<!DOCTYPE html>
<html>
<head>
  <title>Cat Cafe Review</title>
</head>
<body>
  <h1>₍^. .^₎⟆ CAT CAFE REVIEW ₍^. .^₎⟆</h1>
  <h3>Thank you for visiting out cafe ૮ ˶ᵔ ᵕ ᵔ˶ ა</h3>
  <p>°❀⋆.ೃ࿔*:･°❀⋆.ೃ࿔*:･°❀⋆.ೃ࿔*:･°❀⋆.ೃ࿔*:･°❀⋆.ೃ࿔*:･°❀⋆.ೃ࿔*:･</p>
  <br><br>
  <form>
    <!--Name of the customer-->
    <label for="name">Name:</label>
     <br>
     <input type="text" id="name" placeholder="Your Name" required>
     <br><br>
     <!--Date of visit-->
     <label for="visit">Date of Visit:</label>
     <input type="date" id="visit">
     <br><br>
     <!--Review-->
     Would you try it again?<br>
     <input type="radio" name="review" required> Yes (,,>ヮ<,,)
     <br>
     <input type="radio" name="review"> No (,,>_<,,)
     <br><br>
     <!--Rating-->
     <label>Rating:</label>
     <input type="radio" id="rate1" name="rating" value="1" required>
     <label for="rate1">1</label>
     <input type="radio" id="rate2" name="rating" value="2">
     <label for="rate2">2</label>
     <input type="radio" id="rate3" name="rating" value="3">
     <label for="rate3">3</label>
     <input type="radio" id="rate4" name="rating" value="4">
     <label for="rate4">4</label>
     <input type="radio" id="rate5" name="rating" value="5">
     <label for="rate5">5</label>
     <br><br>
     <!--Written Review-->
     <textarea rows="4" cols="50" placeholder="Review (•⩊•)"></textarea>
     <br><br>
     <!--Recommendation Question-->
     <input type="checkbox">
     I would recommend this café to my friends. ˃ 𖥦 ˂
     <br><br>
     <input type="submit" value="Submit Review">
     
  </form>
</body>
</html>
